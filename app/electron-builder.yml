appId: com.jaea.guilhaddas
productName: GUI-LHADDAS
copyright: Copyright © 2023-2026 Japan Atomic Energy Agency
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!dist/**'
  - '!*.zip'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron.vite.config.*.mjs'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/cesium/**'
win:
  target: nsis
  executableName: GUI-LHADDAS
nsis:
  artifactName: ${name}-${version}-win-setup.${ext}
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createStartMenuShortcut: true
  shortcutName: GUI-LHADDAS
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch:
        - arm64
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
dmg:
  artifactName: ${name}-${version}-mac.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}-linux.${ext}
npmRebuild: false
publish:
  provider: github
  owner: satoh-daiki
  repo: GUI-LHADDAS
extraResources:
  - from: src/renderer/public/cesium
    to: cesium
    filter:
      - '**/*'
  - from: src/renderer/src/components/common
    to: templates
    filter:
      - LOHDIM-LES_input_template.data
      - SIBYL_input_template.data
